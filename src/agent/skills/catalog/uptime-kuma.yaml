name: uptime-kuma
display: Uptime Kuma
replaces: UptimeRobot / Pingdom
icon: "\U0001F49A"
category: monitoring
description: "Self-hosted monitoring \u2014 uptime checks, notifications, status pages."
docker:
  image: louislam/uptime-kuma:latest
  port: 3001
  restart: unless-stopped
  volumes:
  - /var/lib/serverstick/data/uptime-kuma:/app/data
health:
  endpoint: /
  method: GET
  expect_status: 200
pangolin:
  subdomain: kuma
llm_cost: low
