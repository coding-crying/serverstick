name: rembg
display: Background Removal
replaces: remove.bg
icon: "\u2702\uFE0F"
category: media
description: AI-powered background removal from images. Upload a photo, get a transparent
  PNG.
docker:
  image: danielgatis/rembg
  port: 7000
  restart: unless-stopped
  volumes: []
  cpu_level: x86_v2  # NumPy requires SSE4.2 (Intel 2008+, AMD 2011+)
health:
  endpoint: /
  method: GET
  expect_status: 200
pangolin:
  subdomain: rembg
llm_cost: low
