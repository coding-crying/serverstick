name: homepage
display: Homepage
replaces: Dashboard spyware / bookmarks
icon: "\U0001F3E0"
category: dashboard
description: "Service dashboard \u2014 see all your self-hosted services at a glance."
docker:
  image: ghcr.io/benphelps/homepage:latest
  port: 3002
  restart: unless-stopped
  volumes:
  - /var/lib/serverstick/data/homepage:/app/config
  - /var/run/docker.sock:/var/run/docker.sock:ro
health:
  endpoint: /
  method: GET
  expect_status: 200
pangolin:
  subdomain: home
llm_cost: low
