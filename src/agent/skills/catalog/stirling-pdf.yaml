name: stirling-pdf
display: Stirling PDF
replaces: ilovepdf / smallpdf
icon: "\U0001F4C4"
category: documents
description: "Full-featured PDF toolkit \u2014 merge, split, convert, compress, OCR,\
  \ sign."
docker:
  image: frooodle/s-pdf:latest
  port: 8440
  restart: unless-stopped
  environment:
    DOCKER_ENABLE_SECURITY: 'false'
    INSTALL_BOOK_AND_ADVANCED_HTML_OPS: 'false'
    SYSTEM_MAXFILESIZE: '50'
  volumes:
  - /var/lib/serverstick/data/stirling-pdf/trainingData:/usr/share/tessdata
  - /var/lib/serverstick/data/stirling-pdf/extraConfigs:/configs
health:
  endpoint: /api/v1/info/status
  method: GET
  expect_status: 200
pangolin:
  subdomain: pdf
llm_cost: low
