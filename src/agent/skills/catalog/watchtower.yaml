name: watchtower
display: Watchtower
replaces: Manual Docker updates
icon: "\U0001F5FC"
category: system
description: Automatically updates your Docker containers. Runs on a schedule, no
  UI needed.
docker:
  image: containrrr/watchtower:latest
  port: 0
  restart: unless-stopped
  environment:
    WATCHTOWER_SCHEDULE: 0 0 4 * * *
    WATCHTOWER_CLEANUP: 'true'
    WATCHTOWER_NOTIFICATIONS: email
  volumes:
  - /var/run/docker.sock:/var/run/docker.sock:ro
health: null
pangolin: null
llm_cost: low
