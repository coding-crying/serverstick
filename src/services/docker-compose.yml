# ServerStick Docker Compose — per-device services
# Auto-managed by Pi Agent. Do not edit manually.

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      - /var/lib/serverstick/data/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - HOMEPAGE_ALLOWED_HOSTS={{DEVICE_NAME}}.serverstick.com
    labels:
      - "com.serverstick.service=homepage"

  stirling-pdf:
    image: frooodle/s-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    ports:
      - "8440:8080"
    volumes:
      - /var/lib/serverstick/data/stirling-pdf/trainingData:/usr/share/tessdata
      - /var/lib/serverstick/data/stirling-pdf/extraConfigs:/configs
    environment:
      - DOCKER_ENABLE_SECURITY=false
      - SECURITY_ENABLE LoginPage=false
    labels:
      - "com.serverstick.service=stirling-pdf"

  privatebin:
    image: privatebin/nginx-fpm-alpine:latest
    container_name: privatebin
    restart: unless-stopped
    ports:
      - "8084:8080"
    volumes:
      - /var/lib/serverstick/data/privatebin:/srv/data
    labels:
      - "com.serverstick.service=privatebin"

  pairdrop:
    image: linuxserver/pairdrop:latest
    container_name: pairdrop
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PUID=1000
      - PGID=1000
    labels:
      - "com.serverstick.service=pairdrop"

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - /var/lib/serverstick/data/uptime-kuma:/app/data
    labels:
      - "com.serverstick.service=uptime-kuma"

  rembg:
    image: danielgatis/rembg:latest
    container_name: rembg
    restart: unless-stopped
    ports:
      - "7000:7000"
    command: s
    labels:
      - "com.serverstick.service=rembg"

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "com.serverstick.service=dozzle"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.40
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
    labels:
      - "com.serverstick.service=watchtower"

networks:
  default:
    name: serverstick