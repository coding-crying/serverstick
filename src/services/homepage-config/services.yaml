# Homepage — ServerStick Dashboard
# https://github.com/benphelps/homepage
# Config format: https://gethomepage.dev/configs/

title: ServerStick
subtitle: Your private cloud — plug and play
logo: https://raw.githubusercontent.com/earendil-works/serverstick/main/logo.png
icon: mdi-server

# Theme
theme: dark
color: slate

# Layout
layout:
  Services:
    style: row
    columns: 3

# The services are all accessed through Pangolin tunnels at *.serverstick.com
# Local access works via mDNS: http://serverstick.local:PORT

services:
  - name: Services
    items:
      - name: Stirling PDF
        description: PDF tools — merge, split, convert, compress
        href: https://pdf.serverstick.com
        icon: mdi-file-pdf-box
        ping: https://pdf.serverstick.com

      - name: PrivateBin
        description: Encrypted pastebin
        href: https://bin.serverstick.com
        icon: mdi-content-paste
        ping: https://bin.serverstick.com

      - name: PairDrop
        description: AirDrop for the web
        href: https://drop.serverstick.com
        icon: mdi-share-variant
        ping: https://drop.serverstick.com

      - name: Background Removal
        description: Remove image backgrounds
        href: https://rembg.serverstick.com
        icon: mdi-image-remove
        ping: https://rembg.serverstick.com

  - name: Monitoring
    items:
      - name: Uptime Kuma
        description: Service monitoring & status pages
        href: https://kuma.serverstick.com
        icon: mdi-heart-pulse

      - name: Container Logs
        description: Dozzle — real-time Docker logs
        href: https://logs.serverstick.com
        icon: mdi-text-box-outline

  - name: System
    items:
      - name: Model Discovery
        description: LLM model discovery API
        href: https://api.serverstick.com
        icon: mdi-unicorn-variant

      - name: Hermes
        description: AI assistant control panel
        href: https://hermes.serverstick.com
        icon: mdi-robot

widgets:
  - resources:
      label: System
      cpu: true
      memory: true
      disk: /
    position:
      width: 2

docker:
  engine: /var/run/docker.sock